version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hr_postgres_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hr_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build: ./backend
    container_name: hr_backend_api
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/hr_system
      - MONGODB_URL=${MONGODB_URL}
      - MONGODB_DB_NAME=hr_system_resumes
      - SECRET_KEY=supersecretjwtkeythatshouldbechangedinproduction12345!
      - ALGORITHM=HS256
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python wait_for_db.py && 
             alembic upgrade head && 
             python seed.py && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    container_name: hr_frontend_client
    ports:
      - "3001:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api

volumes:
  postgres_data:
